name: Build QMK Firmware (Vial)

on:
  workflow_dispatch:
    inputs:
      full_keyboard:
        description: 'Select keyboard version'
        required: true
        type: choice
        options:
          - x1s-103c 
          - x2s-v2 
          - x3s-v2 
          - x3e-v2 
          - minix-103c
          - minix-072c
          - v5a-103c
          - v5a-072c
          - v6e-401r
          - v6e-072r
          - v6e-072c
          - v6a-072c
          - x7s-103c
          - x7s-072c
          - x10s-103c
          - x10s-072c
          - p25s-v2
          - p25e-v2
          - p30s-v2
          - p30e-v2
          - x30s-401r
          - x30s-072r
          - x30s-072c
          - x30v-401r
          - x30v-072r
          - x30v-072c
          - x32s-072c
          - k42s-v1
          - y42s-103c
          - k45s-v2
          - y45s-103c
          - y45s-072c
          - x4r-2040
          - x4s-103c
          - x4s-072c
          - x4e-103c
          - x4e-072c
          - v4s-103c
          - v4s-072c
          - v4e-103c
          - v4e-072c
          - v4x-072c
          - p15s-v2
          - p20s-v2
          - p20r-2040
          - p24s-v2
          - p30r-v2
          - p34s-v2
          - p40s-v2
          - p44s-v2
          - p48s-v2
          - p60s-v2
          - p64s-072v
          - p64s-072v
          - x6s-103c
          - x6s-401r
          - x6s-072c
          - x26s-401r
          - x26s-072c
          - x26s-072r
          - x36-v2
          - p9s-v2
          - p16s-v2
          - k57s-v2
          - ds24-v2
          - ds30-v2
          - gbpad-v2
          - gbpad-v2
          - mj26s-v2
          - pb21a-2040
          - pb21a-072c
          - yy21a-2040
          - yy21a-072c
      keymap:
        description: 'Select keymap'
        required: true
        default: 'vial'
        type: string

env:
  VIAL_DIR: ${{ github.workspace }}/vial-qmk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Restore cached Vial QMK source
        id: cache-qmk
        uses: actions/cache@v4
        with:
          path: ${{ env.VIAL_DIR }}
          key: vial-qmk-cache

      - name: Clone Vial QMK (if cache not found)
        if: steps.cache-qmk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch vial https://github.com/vial-kb/vial-qmk.git ${{ env.VIAL_DIR }}

      - name: Pull user keyboard files
        uses: actions/checkout@v4

      - name: Merge keyboard files
        run: |
          # 检查 keyboards 目录是否存在
          if [ -d "keyboards" ]; then
            cp -r keyboards/* ${{ env.VIAL_DIR }}/keyboards/
          else
            echo "Error: keyboards directory not found!"
            ls -la
            exit 1
          fi

      - name: Build firmware
        uses: docker://ghcr.io/qmk/qmk_cli
        with:
          entrypoint: /bin/bash
          args: |
            -c "
              cd ${{ env.VIAL_DIR }}
              qmk setup --yes
              KEYBOARD_PATH=$(echo '${{ github.event.inputs.full_keyboard }}' | tr '-' '/')
              echo 'Building: '${KEYBOARD_PATH}
              qmk compile -kb \${KEYBOARD_PATH} -km ${{ github.event.inputs.keymap }}
            "

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.full_keyboard }}-${{ github.event.inputs.keymap }}-vial
          path: |
            ${{ env.VIAL_DIR }}/*.hex
            ${{ env.VIAL_DIR }}/*.bin
            ${{ env.VIAL_DIR }}/*.uf2