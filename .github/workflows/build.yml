name: Build QMK Firmware (Vial)

on:
  workflow_dispatch:
    inputs:
      full_keyboard:
        description: 'Select keyboard version'
        required: true
        type: choice
        options:
          - x1s-103c 
          - x2s-v2 
          - x3s-v2 
          - x3e-v2 
          - minix-103c
          - minix-072c
          - v5a-103c
          - v5a-072c
          - v6e-401r
          - v6e-072r
          - v6e-072c
          - v6a-072c
          - x7s-103c
          - x7s-072c
          - x10s-103c
          - x10s-072c
          - p25s-v2
          - p25e-v2
          - p30s-v2
          - p30e-v2
          - x30s-401r
          - x30s-072r
          - x30s-072c
          - x30v-401r
          - x30v-072r
          - x30v-072c
          - x32s-072c
          - k42s-v1
          - y42s-103c
          - k45s-v2
          - y45s-103c
          - y45s-072c
          - x4r-2040
          - x4s-103c
          - x4s-072c
          - x4e-103c
          - x4e-072c
          - v4s-103c
          - v4s-072c
          - v4e-103c
          - v4e-072c
          - v4x-072c
          - p15s-v2
          - p20s-v2
          - p20r-2040
          - p24s-v2
          - p30r-v2
          - p34s-v2
          - p40s-v2
          - p44s-v2
          - p48s-v2
          - p60s-v2
          - p64s-072v
          - x6s-103c
          - x6s-401r
          - x6s-072c
          - x26s-401r
          - x26s-072c
          - x26s-072r
          - x36-v2
          - p9s-v2
          - p16s-v2
          - k57s-v2
          - ds24-v2
          - ds30-v2
          - gbpad-v2
          - mj26s-v2
          - pb21a-2040
          - pb21a-072c
          - yy21a-2040
          - yy21a-072c
      keymap:
        description: 'Select keymap'
        required: true
        default: 'vial'
        type: string

env:
  VIAL_DIR: ${{ github.workspace }}/vial-qmk

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli
    steps:
      - name: Restore cached Vial QMK source
        id: cache-qmk
        uses: actions/cache@v4
        with:
          path: ${{ env.VIAL_DIR }}
          key: vial-qmk-cache

      - name: Clone Vial QMK (if cache not found)
        if: steps.cache-qmk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 0.7.0 https://github.com/vial-kb/vial-qmk.git ${{ env.VIAL_DIR }}

      - name: Pull user keyboard files
        uses: actions/checkout@v4

      - name: Link all keyboard folders
        run: |
          mkdir -p ${{ env.VIAL_DIR }}/keyboards

          # 获取键盘名称列表（从 full_keyboard 选项中提取唯一的键盘名）
          # 例如：x1s-103c -> x1s, minix-103c -> minix
          KEYBOARD_NAMES=$(echo '${{ github.event.inputs.full_keyboard }}' | tr ' ' '\n' | sed 's/-.*//' | sort -u)

          # 或者直接链接仓库根目录下的所有键盘文件夹（排除系统文件夹）
          for dir in /__w/QMK-Keyboard/QMK-Keyboard/*/; do
            dirname=$(basename "$dir")
            # 跳过系统文件夹
            if [[ "$dirname" == ".github" ]] || [[ "$dirname" == "vial-qmk" ]] || [[ "$dirname" == "." ]] || [[ "$dirname" == ".." ]]; then
              continue
            fi
            # 检查是否是有效的键盘目录（包含版本子文件夹）
            if [ -d "$dir" ]; then
              echo "Linking keyboard: $dirname"
              ln -sf "$dir" ${{ env.VIAL_DIR }}/keyboards/$dirname
            fi
          done

          echo "Linked keyboards:"
          ls -la ${{ env.VIAL_DIR }}/keyboards/

      - name: Build firmware
        run: |
          cd ${{ env.VIAL_DIR }}

          qmk setup --yes || true

          # 将 x1s-103c 转换成 x1s/103c
          KEYBOARD_PATH=$(echo "${{ github.event.inputs.full_keyboard }}" | tr '-' '/')
          KEYMAP="${{ github.event.inputs.keymap }}"

          echo "Building: $KEYBOARD_PATH with keymap: $KEYMAP"

          # 检查键盘是否存在
          if [ ! -d "keyboards/$KEYBOARD_PATH" ]; then
            echo "Error: Keyboard '$KEYBOARD_PATH' not found!"
            echo "Available keyboards:"
            find keyboards -maxdepth 2 -type d | head -20
            exit 1
          fi

          qmk compile -kb "$KEYBOARD_PATH" -km "$KEYMAP"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.full_keyboard }}-${{ github.event.inputs.keymap }}-vial
          path: |
            ${{ env.VIAL_DIR }}/*.hex
            ${{ env.VIAL_DIR }}/*.bin
            ${{ env.VIAL_DIR }}/*.uf2